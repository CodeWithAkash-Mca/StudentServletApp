<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student Details</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-shell">
  <div class="form-card">
    <h2>Enter Student Details</h2>
    <p class="subtitle">Provide complete student information for detailed processing.</p>

    <form action="../studentDetails" method="post">
      <label>Name
        <input type="text" name="name" placeholder="Enter full name">
      </label>
      <label>Age
        <input type="number" name="age" placeholder="Enter age">
      </label>
      <label>Course
        <input type="text" name="course" placeholder="Enter course name">
      </label>

      <div class="form-row">
        <label class="field-group inline">Gender
          <div>
            <input type="radio" name="gender" value="Male">Male
            <input type="radio" name="gender" value="Female">Female
          </div>
        </label>

        <label class="field-group inline">Skills
          <div>
            <input type="checkbox" name="skills" value="Java">Java
            <input type="checkbox" name="skills" value="Python">Python
            <input type="checkbox" name="skills" value="C++">C++
          </div>
        </label>
      </div>

      <div class="form-actions">
        <input type="submit" value="Submit">
      </div>
    </form>

    <div class="link-row">
      <a class="button-link" href="../index.jsp">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
