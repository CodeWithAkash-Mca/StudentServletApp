<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-shell">
  <div class="form-card">
    <h2>DB Login</h2>
    <p class="subtitle">Authenticate with username and password from the database.</p>

    <form action="../loginDb" method="post">
      <label>Username
        <input type="text" name="username" placeholder="Enter username">
      </label>
      <label>Password
        <input type="password" name="password" placeholder="Enter password">
      </label>
      <div class="form-actions">
        <input type="submit" value="Login">
      </div>
    </form>

    <div class="link-row">
      <a class="button-link" href="../index.jsp">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
