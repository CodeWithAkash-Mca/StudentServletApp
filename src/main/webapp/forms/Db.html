<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert Student</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-shell">
  <div class="form-card">
    <h2>Add Student</h2>
    <p class="subtitle">Insert new student records into the database.</p>

    <form action="../insert" method="post">
      <label>Name
        <input type="text" name="name" placeholder="Enter student name">
      </label>
      <label>Age
        <input type="number" name="age" placeholder="Enter age">
      </label>
      <label>Course
        <input type="text" name="course" placeholder="Enter course name">
      </label>
      <div class="form-actions">
        <input type="submit" value="Save">
      </div>
    </form>

    <div class="link-row">
      <a class="button-link" href="../view">View Students</a>
      <a class="button-link" href="../index.jsp">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
